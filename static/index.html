<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>
    <section id="auth-page" class="page auth-page">
        <div class="auth-card glass-panel">
            <div class="auth-brand">
                <span class="brand-mark">TS</span>
                <div>
                    <h1>任务管理系统</h1>
                    <p>登录后管理你的任务和复习计划</p>
                </div>
            </div>

            <div class="auth-tabs" role="tablist">
                <button type="button" class="auth-tab active" data-auth-tab="login">登录</button>
                <button type="button" class="auth-tab" data-auth-tab="register">注册</button>
            </div>

            <form id="login-form" class="auth-form active" data-auth-panel="login">
                <label class="field">
                    <span>用户名</span>
                    <input type="text" id="login-username" autocomplete="username" minlength="3" maxlength="30" required>
                </label>
                <label class="field">
                    <span>密码</span>
                    <input type="password" id="login-password" autocomplete="current-password" minlength="6" maxlength="30" required>
                </label>
                <button type="submit" class="btn btn-primary" data-testid="login-submit">登录</button>
            </form>

            <form id="register-form" class="auth-form" data-auth-panel="register">
                <label class="field">
                    <span>用户名</span>
                    <input type="text" id="reg-username" autocomplete="username" minlength="3" maxlength="30" required>
                </label>
                <label class="field">
                    <span>密码</span>
                    <input type="password" id="reg-password" autocomplete="new-password" minlength="6" maxlength="30" required>
                </label>
                <label class="field">
                    <span>确认密码</span>
                    <input type="password" id="reg-confirm" autocomplete="new-password" minlength="6" maxlength="30" required>
                </label>
                <button type="submit" class="btn btn-primary" data-testid="register-submit">注册</button>
            </form>

            <div id="auth-msg" class="inline-message hidden" role="status"></div>
        </div>
    </section>

    <section id="main-page" class="page app-page hidden">
        <aside class="sidebar glass-panel">
            <div class="sidebar-brand">
                <span class="brand-mark">TS</span>
                <div>
                    <strong>Task System</strong>
                    <span>FastAPI 工作台</span>
                </div>
            </div>

            <nav class="side-nav" aria-label="主导航">
                <button type="button" class="nav-item active" data-view="tasks">任务中心</button>
                <button type="button" class="nav-item" data-view="ai">AI 复习计划</button>
            </nav>

            <div class="user-panel">
                <span id="username-display"></span>
                <button type="button" id="logout-btn" class="btn btn-ghost">退出登录</button>
            </div>
        </aside>

        <main class="workspace">
            <header class="topbar glass-panel">
                <div>
                    <span class="eyebrow">个人任务面板</span>
                    <h2 id="workspace-title">任务中心</h2>
                </div>
                <div class="topbar-actions">
                    <button type="button" id="refresh-btn" class="btn btn-ghost">刷新</button>
                    <button type="button" id="add-task-btn" class="btn btn-primary" data-testid="add-task">新建任务</button>
                </div>
            </header>

            <section id="tasks-view" class="view active">
                <div class="metric-grid">
                    <div class="metric glass-panel">
                        <span>全部</span>
                        <strong id="metric-total">0</strong>
                    </div>
                    <div class="metric glass-panel">
                        <span>待办</span>
                        <strong id="metric-todo">0</strong>
                    </div>
                    <div class="metric glass-panel">
                        <span>进行中</span>
                        <strong id="metric-doing">0</strong>
                    </div>
                    <div class="metric glass-panel">
                        <span>已完成</span>
                        <strong id="metric-done">0</strong>
                    </div>
                </div>

                <section class="task-panel glass-panel">
                    <div class="panel-head">
                        <div>
                            <h3>任务列表</h3>
                            <span id="task-count-label">共 0 条</span>
                        </div>
                        <div class="filter-row">
                            <label class="search-field">
                                <span>搜索</span>
                                <input type="search" id="task-search" placeholder="标题或描述">
                            </label>
                            <label class="compact-field">
                                <span>状态</span>
                                <select id="status-filter">
                                    <option value="">全部</option>
                                    <option value="todo">待办</option>
                                    <option value="doing">进行中</option>
                                    <option value="done">已完成</option>
                                </select>
                            </label>
                            <label class="compact-field">
                                <span>优先级</span>
                                <select id="priority-filter">
                                    <option value="">全部</option>
                                    <option value="high">高</option>
                                    <option value="medium">中</option>
                                    <option value="low">低</option>
                                </select>
                            </label>
                            <label class="compact-field">
                                <span>每页</span>
                                <select id="page-size">
                                    <option value="6">6</option>
                                    <option value="10" selected>10</option>
                                    <option value="20">20</option>
                                </select>
                            </label>
                        </div>
                    </div>

                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>任务</th>
                                    <th>状态</th>
                                    <th>优先级</th>
                                    <th>更新时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="task-tbody"></tbody>
                        </table>
                    </div>

                    <div id="empty-msg" class="empty-state hidden">
                        <strong>暂无任务</strong>
                        <span>新建任务后会出现在这里。</span>
                    </div>

                    <div class="pagination">
                        <button type="button" id="prev-page" class="btn btn-ghost">上一页</button>
                        <span id="page-info">第 1 / 1 页</span>
                        <button type="button" id="next-page" class="btn btn-ghost">下一页</button>
                    </div>
                </section>
            </section>

            <section id="ai-view" class="view">
                <div class="ai-grid">
                    <section class="ai-card glass-panel">
                        <div class="panel-head">
                            <div>
                                <h3>规则命令</h3>
                                <span>执行任务创建和批量操作</span>
                            </div>
                        </div>
                        <label class="field">
                            <span>命令</span>
                            <input type="text" id="ai-input" placeholder="创建任务：复习数据库，优先级高">
                        </label>
                        <div class="quick-actions">
                            <button type="button" class="chip" data-command="创建任务：复习数据库，优先级高">创建高优先级任务</button>
                            <button type="button" class="chip" data-command="把所有todo改成doing">todo 转进行中</button>
                            <button type="button" class="chip danger" data-command="删除所有done任务">删除已完成</button>
                        </div>
                        <button type="button" id="ai-btn" class="btn btn-primary">执行命令</button>
                        <div id="ai-result" class="inline-message hidden" role="status"></div>
                    </section>

                    <section class="ai-card glass-panel">
                        <div class="panel-head">
                            <div>
                                <h3>考试安排解析</h3>
                                <span>把文本解析成课程和考试时间</span>
                            </div>
                        </div>
                        <label class="field">
                            <span>考试安排文本</span>
                            <textarea id="exam-text" rows="7" placeholder="高数 2026-06-10 09:00&#10;英语 2026-06-13 15:00"></textarea>
                        </label>
                        <button type="button" id="parse-exam-btn" class="btn btn-primary">解析安排</button>
                        <div id="exam-list" class="result-list"></div>
                    </section>

                    <section class="ai-card glass-panel ai-card-wide">
                        <div class="panel-head">
                            <div>
                                <h3>复习计划预览</h3>
                                <span>生成后可一键导入为任务</span>
                            </div>
                            <div class="panel-actions">
                                <button type="button" id="preview-plan-btn" class="btn btn-ghost">生成预览</button>
                                <button type="button" id="import-plan-btn" class="btn btn-primary" disabled>导入任务</button>
                            </div>
                        </div>
                        <div id="review-preview" class="preview-grid"></div>
                    </section>
                </div>
            </section>
        </main>
    </section>

    <div id="task-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-panel glass-panel">
            <div class="modal-head">
                <h3 id="modal-title">新建任务</h3>
                <button type="button" class="icon-btn modal-close" aria-label="关闭">×</button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <label class="field">
                    <span>标题</span>
                    <input type="text" id="task-title" maxlength="100" required>
                </label>
                <label class="field">
                    <span>描述</span>
                    <textarea id="task-desc" rows="4" maxlength="500"></textarea>
                </label>
                <div class="form-row">
                    <label class="field">
                        <span>状态</span>
                        <select id="task-status">
                            <option value="todo">待办</option>
                            <option value="doing">进行中</option>
                            <option value="done">已完成</option>
                        </select>
                    </label>
                    <label class="field">
                        <span>优先级</span>
                        <select id="task-priority">
                            <option value="low">低</option>
                            <option value="medium" selected>中</option>
                            <option value="high">高</option>
                        </select>
                    </label>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-ghost modal-close">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div id="delete-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-panel modal-small glass-panel">
            <div class="modal-head">
                <h3>确认删除</h3>
                <button type="button" class="icon-btn" id="delete-cancel-x" aria-label="关闭">×</button>
            </div>
            <p class="modal-copy">删除后不可恢复。</p>
            <div class="form-actions">
                <button type="button" class="btn btn-ghost" id="delete-cancel">取消</button>
                <button type="button" class="btn btn-danger" id="delete-confirm">删除</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden" role="status"></div>

    <script src="/static/js/app.js?v=2"></script>
</body>
</html>
